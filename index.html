<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Som Estereo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#667eea;min-height:100vh;display:flex;justify-content:center;align-items:center;color:#fff}
.container{background:rgba(255,255,255,.1);padding:30px;border-radius:15px;max-width:500px;width:90%}
h1{text-align:center;margin-bottom:20px;font-size:2em}
.info{text-align:center;margin-bottom:20px;font-size:1em}
.sound-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;margin-top:20px}
.sound-button{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);padding:25px 15px;border-radius:10px;cursor:pointer;transition:all .3s;color:#fff;font-size:1em;font-weight:bold;text-align:center}
.sound-button:hover{background:rgba(255,255,255,.3);transform:translateY(-3px)}
.sound-button:active{transform:translateY(-1px)}
.sound-button.playing{animation:pulse .5s;background:rgba(255,255,255,.4)}
.sound-button.active{background:rgba(76,175,80,.5);border-color:rgba(76,175,80,.8);box-shadow:0 0 20px rgba(76,175,80,.6)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.position-label{font-size:.85em;opacity:.8;margin-top:5px}
.controls{margin-top:25px;text-align:center}
.control-group{margin:12px 0}
label{display:block;margin-bottom:5px;font-weight:bold}
input[type="range"]{width:100%;max-width:280px}
.value-display{display:inline-block;margin-left:10px;font-weight:bold;min-width:60px}
.play-all{margin-top:15px;padding:12px 35px;background:rgba(255,255,255,.3);border:2px solid rgba(255,255,255,.5);border-radius:20px;color:#fff;font-size:1em;font-weight:bold;cursor:pointer;transition:all .3s}
.play-all:hover{background:rgba(255,255,255,.4);transform:scale(1.05)}
</style>
</head>
<body>
<div class="container">
<h1>Som Estereo</h1>
<div class="info">Clique para ativar/desativar - Pode ativar varios ao mesmo tempo</div>
<div class="sound-grid">
<div class="sound-button" data-pan="-1" data-freq="300"><div>Esquerda</div><div class="position-label">300 Hz</div></div>
<div class="sound-button" data-pan="0" data-freq="500"><div>Centro</div><div class="position-label">500 Hz</div></div>
<div class="sound-button" data-pan="1" data-freq="700"><div>Direita</div><div class="position-label">700 Hz</div></div>
</div>
<div class="controls">
<div class="control-group">
<label>Volume: <span class="value-display" id="v">30%</span></label>
<input type="range" id="vol" min="0" max="100" value="30" step="1">
</div>
<div class="control-group">
<label>Duracao: <span class="value-display" id="d">200 ms</span></label>
<input type="range" id="dur" min="50" max="500" value="200" step="10">
</div>
<button class="play-all" id="all">Tocar Sequencia</button>
</div>
</div>
<script>
let ctx=null;
function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx}
function play(p,f,t){
let c=getCtx(),o=c.createOscillator(),g=c.createGain(),s=c.createStereoPanner(),n=c.currentTime;
let vol=parseInt(document.getElementById('vol').value)/100;
o.type='sine';o.frequency.value=f;g.gain.value=vol;s.pan.value=p;
o.connect(g);g.connect(s);s.connect(c.destination);
g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(vol,n+0.01);g.gain.linearRampToValueAtTime(0,n+t/1000);
o.start(n);o.stop(n+t/1000);
}
let dr=document.getElementById('dur');
let activeButtons=new Set();
let globalInterval=null;
function startGlobalBeep(){
if(!globalInterval){
globalInterval=setInterval(()=>{
activeButtons.forEach(btn=>{
let p=parseFloat(btn.dataset.pan),f=parseInt(btn.dataset.freq),t=parseInt(dr.value);
play(p,f,t);
btn.classList.add('playing');
setTimeout(()=>btn.classList.remove('playing'),t);
});
},500);
}
}
function stopGlobalBeep(){
if(globalInterval&&activeButtons.size===0){
clearInterval(globalInterval);
globalInterval=null;
}
}
document.querySelectorAll('.sound-button').forEach(b=>{
b.addEventListener('click',function(){
if(this.classList.contains('active')){
activeButtons.delete(this);
this.classList.remove('active');
stopGlobalBeep();
}else{
let p=parseFloat(this.dataset.pan),f=parseInt(this.dataset.freq),t=parseInt(dr.value);
this.classList.add('active');
activeButtons.add(this);
play(p,f,t);
this.classList.add('playing');
setTimeout(()=>this.classList.remove('playing'),t);
startGlobalBeep();
}
});
});
document.getElementById('all').addEventListener('click',function(){
let bs=document.querySelectorAll('.sound-button'),t=parseInt(dr.value),dl=t+100;
bs.forEach((b,i)=>{
setTimeout(()=>{
let p=parseFloat(b.dataset.pan),f=parseInt(b.dataset.freq);
play(p,f,t);
b.classList.add('playing');
setTimeout(()=>b.classList.remove('playing'),t);
},dl*i);
});
});
dr.addEventListener('input',function(){document.getElementById('d').textContent=this.value+' ms'});
document.getElementById('vol').addEventListener('input',function(){document.getElementById('v').textContent=this.value+'%'});
</script>
</body>
</html>
